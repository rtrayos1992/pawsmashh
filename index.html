══════════════════════════════════════════════════════ */
const ADMIN_PIN_KEY = "ps_admin_pin";
const DEFAULT_PIN   = "03142026";

function LoginScreen({ onLogin }) {
  const [pin, setPin]       = useState("");
  const [error, setError]   = useState("");
  const [showPin, setShowPin] = useState(false);

  function tryAdmin() {
    const stored = (() => { try { return JSON.parse(localStorage.getItem(ADMIN_PIN_KEY)) || DEFAULT_PIN; } catch { return DEFAULT_PIN; } })();
    if (pin === stored) { onLogin("admin"); }
    else { setError("Wrong PIN. Try again."); setPin(""); }
  }

  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'DM Sans',sans-serif"}}>
      <PawBg/>
      <div style={{position:"relative",zIndex:1,width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <PawSmashLogo/>
          <div style={{color:C.muted,fontSize:13,marginTop:12}}>Choose your access level</div>
        </div>

        {/* Player button — no PIN needed */}
        <button onClick={()=>onLogin("player")}
          style={{width:"100%",background:`${C.pink}18`,border:`2px solid ${C.pink}55`,borderRadius:16,padding:"20px 24px",cursor:"pointer",marginBottom:16,textAlign:"left",transition:"all 0.2s"}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:32}}>🏸</div>
            <div>
              <div style={{color:C.white,fontWeight:700,fontSize:16,fontFamily:"'Fredoka One',sans-serif",letterSpacing:1}}>Player View</div>
              <div style={{color:C.muted,fontSize:12,marginTop:3}}>View the schedule — no PIN required</div>
            </div>
          </div>
        </button>

        {/* Admin card */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:"20px 24px"}}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:18}}>
            <div style={{fontSize:32}}>🛡️</div>
            <div>
              <div style={{color:C.white,fontWeight:700,fontSize:16,fontFamily:"'Fredoka One',sans-serif",letterSpacing:1}}>Admin View</div>
              <div style={{color:C.muted,fontSize:12,marginTop:3}}>Full access — enter PIN</div>
            </div>
          </div>
          <div style={{position:"relative",marginBottom:12}}>
            <input
              type={showPin?"text":"password"}
              value={pin}
              onChange={e=>{setPin(e.target.value);setError("");}}
              onKeyDown={e=>e.key==="Enter"&&tryAdmin()}
              placeholder="Enter admin PIN"
              style={{...SEL,letterSpacing:showPin?1:4,fontSize:18}}
            />
            <button onClick={()=>setShowPin(p=>!p)}
              style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:14}}>
              {showPin?"🙈":"👁"}
            </button>
          </div>
          {error && <div style={{color:"#e74c3c",fontSize:12,marginBottom:10}}>⚠️ {error}</div>}
          <button onClick={tryAdmin} style={{...primaryBtn,width:"100%",textAlign:"center"}}>
            🔓 Enter as Admin
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   PLAYER SCHEDULE VIEW (read-only — no score entry,
   no reschedule, no winner buttons)
══════════════════════════════════════════════════════ */
function PlayerMatchCard({ match, matchState }) {
  const { home, away, court, startMin, level, bracket } = match;
  const { scoreHome="", scoreAway="", winner=null, matchStatus="pending" } = matchState || {};
  const cc = COURT_COLORS[(court-1) % COURT_COLORS.length];

  const borderColor = matchStatus==="ongoing" ? C.pink
    : matchStatus==="done" ? "rgba(46,204,113,0.4)"
    : C.border;
  const bgColor = matchStatus==="ongoing" ? `${C.pink}18`
    : matchStatus==="done" ? "rgba(46,204,113,0.06)"
    : C.surface;

  return (
    <div style={{background:bgColor,border:`1px solid ${borderColor}`,borderRadius:14,overflow:"hidden",position:"relative",transition:"all 0.3s"}}>
      {/* Ongoing top bar */}
      {matchStatus==="ongoing" && (
        <div style={{height:3,background:`linear-gradient(90deg,${C.pink},#f472b6)`}}/>
      )}
      <div style={{padding:"12px 14px"}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}>
          <div style={{background:`${cc}33`,border:`1px solid ${cc}66`,borderRadius:7,padding:"2px 9px",fontFamily:"'Fredoka One',sans-serif",fontSize:13,color:cc,flexShrink:0}}>C{court}</div>
          <LevelBadge level={level}/>
          <BktBadge bracket={bracket}/>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
            {matchStatus==="ongoing" && (
              <div style={{display:"flex",alignItems:"center",gap:4,background:"rgba(233,30,140,0.2)",border:`1px solid ${C.pink}66`,borderRadius:6,padding:"2px 8px"}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:C.pink,animation:"pulse 1s infinite"}}/>
                <span style={{color:C.pink,fontSize:10,fontWeight:700,letterSpacing:1}}>ONGOING</span>
              </div>
            )}
            {matchStatus==="done" && <span style={{fontSize:11,color:"#2ecc71",fontWeight:700}}>✅ Done</span>}
            {matchStatus==="pending" && <span style={{fontSize:11,color:C.muted}}>{minutesToTime(startMin)}</span>}
          </div>
        </div>

        {/* Teams */}
        <div>
          <div style={{fontSize:13,fontWeight:winner==="home"?700:500,color:winner==="home"?C.pink:C.white}}>
            {winner==="home" && "🏆 "}{home.player1} & {home.player2}
          </div>
          {(scoreHome!=="" && scoreAway!=="") && matchStatus==="done" && (
            <div style={{fontFamily:"'Fredoka One',sans-serif",fontSize:20,color:winner==="home"?C.pink:"#aaa",lineHeight:1.2}}>{scoreHome}</div>
          )}
          <div style={{fontSize:11,color:C.muted,margin:"4px 0"}}>vs</div>
          <div style={{fontSize:13,fontWeight:winner==="away"?700:500,color:winner==="away"?C.pink:C.white}}>
            {winner==="away" && "🏆 "}{away.player1} & {away.player2}
          </div>
          {(scoreHome!=="" && scoreAway!=="") && matchStatus==="done" && (
            <div style={{fontFamily:"'Fredoka One',sans-serif",fontSize:20,color:winner==="away"?C.pink:"#aaa",lineHeight:1.2}}>{scoreAway}</div>
          )}
        </div>
      </div>
    </div>
  );
}

function PlayerView({ schedule, matchStates }) {
  const [filterLv, setFilterLv] = useState("ALL");
  const [filterCt, setFilterCt] = useState("ALL");
  const [search,   setSearch]   = useState("");


  const getStatus = m => (matchStates[m.id]?.matchStatus) || "pending";

  const ongoingMatches = useMemo(() =>
    schedule.filter(m => getStatus(m) === "ongoing"),
    [schedule, matchStates]);

  const filtered = useMemo(() =>
    schedule.filter(m =>
      (filterLv==="ALL" || m.level===filterLv) &&
      (filterCt==="ALL" || m.court===Number(filterCt)) &&
      (!search || [m.home.player1,m.home.player2,m.away.player1,m.away.player2]
        .some(n => n.toLowerCase().includes(search.toLowerCase())))
    ), [schedule, filterLv, filterCt, search]);

  const byTime = useMemo(() => {
    const map = {};
    filtered.forEach(m => { if (!map[m.startMin]) map[m.startMin]=[]; map[m.startMin].push(m); });
    return Object.entries(map).sort((a,b)=>+a[0]-+b[0]);
  }, [filtered]);

    
    return koMatch ? koMatch.startMin : null;

  const doneCount    = useMemo(() => schedule.filter(m => getStatus(m)==="done").length,    [schedule, matchStates]);
  const pendingCount = useMemo(() => schedule.filter(m => getStatus(m)==="pending").length,  [schedule, matchStates]);

  if (!schedule.length) return (
    <div style={{textAlign:"center",padding:"60px 20px"}}>
      <div style={{fontSize:48,marginBottom:12}}>📅</div>
      <div style={{color:C.muted,fontSize:14}}>Schedule hasn't been generated yet.</div>
      <div style={{color:C.muted,fontSize:12,marginTop:6}}>Check back soon!</div>
    </div>
  );

  return (
    <div>
      <style>{`
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        @keyframes liveglow { 0%,100%{box-shadow:0 0 0 0 rgba(233,30,140,0.4)} 50%{box-shadow:0 0 0 8px rgba(233,30,140,0)} }
      `}</style>

      {/* ── Ongoing banner ── */}
      {ongoingMatches.length > 0 && (
        <div style={{background:`linear-gradient(135deg,${C.pink}22,rgba(244,114,182,0.1))`,border:`1px solid ${C.pink}55`,borderRadius:16,padding:"16px 20px",marginBottom:20,animation:"liveglow 2s infinite"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:C.pink,animation:"pulse 1s infinite"}}/>
              <span style={{fontFamily:"'Fredoka One',sans-serif",fontSize:18,color:C.pink,letterSpacing:1}}>ON COURT NOW</span>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>
            {ongoingMatches.map(m => <PlayerMatchCard key={m.id} match={m} matchState={matchStates[m.id]}/>)}
          </div>
        </div>
      )}

      {/* ── Summary pills ── */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {[
          {n:ongoingMatches.length, label:"Ongoing",   color:C.pink,    bg:`${C.pink}22`},
          {n:pendingCount,          label:"Pending",   color:"#f1c40f", bg:"rgba(241,196,15,0.1)"},
          {n:doneCount,             label:"Completed", color:"#2ecc71", bg:"rgba(46,204,113,0.1)"},
        ].map(({n,label,color,bg}) => (
          <div key={label} style={{background:bg,border:`1px solid ${color}44`,borderRadius:10,padding:"6px 14px",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontFamily:"'Fredoka One',sans-serif",fontSize:20,color,lineHeight:1}}>{n}</span>
            <span style={{fontSize:11,color,fontWeight:600}}>{label}</span>
          </div>
        ))}

      </div>

      {/* ── Search ── */}
      <div style={{position:"relative",marginBottom:12}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:C.muted}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search your name to find your matches..."
          style={{...SEL,paddingLeft:34}}/>
        {search && <button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16}}>✕</button>}
      </div>

      {/* ── Filters ── */}
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
        <select value={filterLv} onChange={e=>setFilterLv(e.target.value)} style={{...SEL,width:"auto",padding:"7px 12px",fontSize:12}}>
          <option value="ALL">All Levels</option>
          {LEVEL_OPTIONS.map(l=><option key={l} value={l}>Level {l} – {LEVEL_META[l].label}</option>)}
        </select>
        <select value={filterCt} onChange={e=>setFilterCt(e.target.value)} style={{...SEL,width:"auto",padding:"7px 12px",fontSize:12}}>
          <option value="ALL">All Courts</option>
          {[1,2,3,4,5,6,7].map(c=><option key={c} value={c}>Court {c}</option>)}
        </select>
        <span style={{color:C.muted,fontSize:12}}>{filtered.length} matches</span>
      </div>

      {/* ── Timeline ── */}
      {byTime.map(([ms,matches]) => {
        const mins      = +ms;
        const isLate    = mins >= END_MINUTES;
        const slotLive  = matches.some(m => (matchStates[m.id]?.matchStatus)==="ongoing");
        const slotDone  = matches.every(m => (matchStates[m.id]?.matchStatus)==="done");
        const slotColor = slotLive ? C.pink : slotDone ? "#2ecc71" : isLate ? "#e74c3c" : C.muted;
        return (
          <div key={ms} style={{marginBottom:24}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{background:slotLive?`${C.pink}22`:slotDone?"rgba(46,204,113,0.1)":C.faint,border:`1px solid ${slotColor}55`,borderRadius:8,padding:"5px 14px",fontFamily:"'Fredoka One',sans-serif",fontSize:16,color:slotColor,flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
                {slotLive && <div style={{width:7,height:7,borderRadius:"50%",background:C.pink,animation:"pulse 1s infinite"}}/>}
                {minutesToTime(mins)}{isLate?" ⚠️":""}
              </div>
              <div style={{flex:1,height:1,background:slotLive?`${C.pink}44`:C.border}}/>
              <span style={{color:slotColor,fontSize:11,fontWeight:slotLive?700:400}}>
                {slotLive?"🔴 Ongoing":slotDone?"✅ Done":`${matches.length} match${matches.length!==1?"es":""}`}
              </span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
              {matches.map(m=><PlayerMatchCard key={m.id} match={m} matchState={matchStates[m.id]}/>)}
            </div>
          </div>
        );
      })}

       && (
        <div style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:36,marginBottom:10}}>🔍</div>
          <div style={{color:C.muted}}>No matches found for "{search}"</div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════ */
const TABS = [
  { id:"teams",    label:"Teams",    icon:"🏸" },
  { id:"brackets", label:"Brackets", icon:"🗂"  },
  { id:"schedule", label:"Schedule", icon:"📅" },
  { id:"results",  label:"Results",  icon:"📊" },
  { id:"knockout", label:"Knockout", icon:"⚔️"  },
  { id:"settings", label:"Settings", icon:"⚙️"  },
];

function App() {
  // ── URL param role — read synchronously before any state ──
  const urlRole = (() => {
    try {
      const p = new URLSearchParams(window.location.search).get("role");
      return p === "player" ? "player" : p === "admin" ? "admin" : null;
    } catch { return null; }
  })();

  // ── Role state — URL param always wins over localStorage ──
  const [role, _setRole] = useState(() => {
    if (urlRole) {
      try { localStorage.setItem("ps_role", JSON.stringify(urlRole)); } catch {}
      return urlRole;
    }
    try { const s = localStorage.getItem("ps_role"); return s ? JSON.parse(s) : null; }
    catch { return null; }
  });
  const setRole = (r) => {
    // If URL forces a role, only allow exiting (null) not switching to another role
    if (urlRole && r !== null) return;
    try { localStorage.setItem("ps_role", JSON.stringify(r)); } catch {}
    _setRole(r);
  };

  // ── ALL hooks must be here before any conditional returns ──
  const [tab,        setTab]        = useState("schedule");
  const [levels,     setLevels]     = useState(["B","C","D","E"]);
  const [brackets,   setBrackets]   = useState([1,2,3,4,5,6,7,8]);
  const [modal,      setModal]      = useState(null);
  const [editTeam,   setEditTeam]   = useState(null);
  const [adminPin,   setAdminPin]   = useLocalStorage(ADMIN_PIN_KEY, DEFAULT_PIN);

  // ── Shared Firebase data ──
  const [teams,           setTeams]           = useSharedState("teams", INITIAL_TEAMS);
  const [scheduleVersion, setScheduleVersion] = useSharedState("scheduleVersion", "");
  // If stored schedule is from an old version, start fresh immediately (before first render)
  const [schedule,        setSchedule]        = useSharedState("schedule",
    (() => {
      try {
        const sv = localStorage.getItem("ps_scheduleVersion");
        const ver = sv ? JSON.parse(sv) : "";
        if (ver !== SCHEDULE_VERSION) return [];
        const s = localStorage.getItem("ps_schedule");
        return s ? JSON.parse(s) : [];
      } catch { return []; }
    })()
  );
  const [matchStates,     setMatchStates]      = useSharedState("matchStates", {});

  // ── Clear stale schedule on version mismatch (init only, not reactive) ──
  // NOTE: Reactive clearing was removed because Firebase snapshots can echo back
  // the old scheduleVersion after a regenerate, causing the new schedule to disappear.
  // Stale data is cleared synchronously in the useState initializer above instead.

  // ── If URL forces a role but state drifted, correct it ──
  useEffect(() => {
    if (urlRole && role !== urlRole) _setRole(urlRole);
  }, []);

  const updateMatchState = useCallback((id, update) =>
    setMatchStates(prev => ({ ...prev, [id]: { ...prev[id], ...update } })), []);

  const addTeam    = useCallback(form => { setTeams(prev => [...prev, { ...form, id:uid() }]); setModal(null); }, []);
  const updateTeam = useCallback(form => { setTeams(prev => prev.map(t => t.id===editTeam?.id ? { ...form, id:t.id } : t)); setEditTeam(null); }, [editTeam]);

  const doneCount = useMemo(() => schedule.filter(m=>isDone(matchStates[m.id])).length, [schedule, matchStates]);

  // ── Shared styles ──
  const globalStyles = (
    <>
      <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
      <style>{`
        *, *::before, *::after { box-sizing: border-box; }
        select, select option { background: #2a1520 !important; color: #fff !important; }
        select { color-scheme: dark; }
        input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
      `}</style>
    </>
  );

  // ── LOGIN ──
  if (!role) return (
    <>{globalStyles}<LoginScreen onLogin={r => {
      try { localStorage.setItem("ps_role", JSON.stringify(r)); } catch {}
      _setRole(r);
    }}/></>
  );

  // ── PLAYER VIEW ──
  if (role === "player") return (
    <>
      {globalStyles}
      <div style={{minHeight:"100vh",background:C.bg,color:C.white,fontFamily:"'DM Sans',sans-serif",position:"relative",paddingBottom:60}}>
        <PawBg/>
        <div style={{position:"relative",zIndex:1}}>
          <div style={{background:`linear-gradient(180deg,${C.surface} 0%,${C.bg} 100%)`,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:100}}>
            <div style={{maxWidth:1000,margin:"0 auto",padding:"16px 20px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <PawSmashLogo/>
                <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{background:`${C.pink}22`,border:`1px solid ${C.pink}44`,borderRadius:8,padding:"4px 12px",color:C.pink,fontSize:11,fontWeight:700,letterSpacing:1}}>
                    🏸 PLAYER VIEW
                  </div>
                  {!urlRole && (
                    <button onClick={()=>setRole(null)}
                      style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"4px 12px",color:C.muted,fontSize:11,cursor:"pointer"}}>
                      ← Exit
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>
          <div style={{maxWidth:1000,margin:"0 auto",padding:"28px 16px"}}>
            <PlayerView schedule={schedule} matchStates={matchStates}/>
          </div>
        </div>
      </div>
    </>
  );

  // ── ADMIN VIEW ──
  return (
    <>
      {globalStyles}
      <div style={{minHeight:"100vh",background:C.bg,color:C.white,fontFamily:"'DM Sans',sans-serif",position:"relative",paddingBottom:60}}>
        <PawBg/>
        <div style={{position:"relative",zIndex:1}}>

          {/* ── Sticky header ── */}
          <div style={{background:`linear-gradient(180deg,${C.surface} 0%,${C.bg} 100%)`,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:100}}>
            <div style={{maxWidth:1000,margin:"0 auto",padding:"16px 20px 0"}}>
              <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16,flexWrap:"wrap"}}>
                <PawSmashLogo/>
                <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  {[
                    {n:teams.length,    label:"PAIRS",   color:C.pink},
                    {n:doneCount,       label:"DONE",    color:"#2ecc71"},
                    {n:schedule.length, label:"MATCHES", color:"#f472b6"},
                  ].map(({n,label,color}) => (
                    <div key={label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"6px 14px",textAlign:"center"}}>
                      <div style={{fontFamily:"'Fredoka One',sans-serif",fontSize:22,color,lineHeight:1}}>{n}</div>
                      <div style={{fontSize:9,color:C.muted,letterSpacing:1.5}}>{label}</div>
                    </div>
                  ))}
                  <div style={{background:"rgba(233,30,140,0.15)",border:`1px solid ${C.pink}44`,borderRadius:8,padding:"4px 10px",color:C.pink,fontSize:10,fontWeight:700,letterSpacing:1}}>🛡️ ADMIN</div>
                  {!urlRole && (
                    <button onClick={()=>setRole(null)} title="Sign out"
                      style={{background:"rgba(231,76,60,0.1)",border:"1px solid rgba(231,76,60,0.3)",borderRadius:8,padding:"6px 12px",color:"#e74c3c",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                      🚪 Exit
                    </button>
                  )}
                </div>
              </div>
              <div style={{height:1,background:`linear-gradient(90deg,transparent,${C.pink}66,transparent)`}}/>
              <div style={{display:"flex",overflowX:"auto"}}>
                {TABS.map(t => (
                  <button key={t.id} onClick={()=>setTab(t.id)}
                    style={{background:"none",border:"none",borderBottom:`3px solid ${tab===t.id?C.pink:"transparent"}`,color:tab===t.id?C.white:C.muted,fontFamily:"'DM Sans',sans-serif",fontWeight:tab===t.id?700:500,fontSize:13,padding:"10px 16px",cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.2s"}}>
                    {t.icon} {t.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* ── Tab content ── */}
          <div style={{maxWidth:1000,margin:"0 auto",padding:"28px 16px"}}>
            {tab==="teams"    && <TeamsView    teams={teams} setTeams={setTeams} levels={levels} brackets={brackets} setModal={setModal} setEditTeam={setEditTeam}/>}
            {tab==="brackets" && <BracketView  teams={teams} levels={levels} brackets={brackets}/>}
            {tab==="schedule" && <ScheduleView teams={teams} schedule={schedule} setSchedule={setSchedule} matchStates={matchStates} setMatchStates={setMatchStates} updateMatchState={updateMatchState} setScheduleVersion={setScheduleVersion}/>}
            {tab==="results"  && <ResultsView  teams={teams} schedule={schedule} matchStates={matchStates} levels={levels} brackets={brackets}/>}
            {tab==="knockout" && <KnockoutView teams={teams} schedule={schedule} matchStates={matchStates}/>}
            {tab==="settings" && <SettingsView levels={levels} setLevels={setLevels} brackets={brackets} setBrackets={setBrackets} adminPin={adminPin} setAdminPin={setAdminPin} onLogout={()=>setRole(null)}/>}
          </div>

        </div>
      </div>

      {/* ── Modals ── */}
      {modal==="addTeam"  && <Modal title="Add Pair"  onClose={()=>setModal(null)}><TeamForm initial={{level:"C",bracket:1,player1:"",player2:"",name:""}} onSave={addTeam}  onCancel={()=>setModal(null)} levels={levels} brackets={brackets}/></Modal>}
      {editTeam           && <Modal title="Edit Pair" onClose={()=>setEditTeam(null)}><TeamForm initial={editTeam} onSave={updateTeam} onCancel={()=>setEditTeam(null)} levels={levels} brackets={brackets}/></Modal>}
    </>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>

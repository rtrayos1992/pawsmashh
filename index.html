function minutesToTime(m) {
  const h=Math.floor(m/60), min=m%60, ampm=h>=12?"PM":"AM";
  const h12 = h > 12 ? h-12 : h === 0 ? 12 : h;
  return `${h12}:${String(min).padStart(2,"0")} ${ampm}`;
}

// ── localStorage (device-local only: role, PIN, firebase config) ──────
function useLocalStorage(key, initial) {
  const [value, setValue] = useState(() => {
    try { const s = localStorage.getItem(key); return s !== null ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  const set = useCallback(updater => {
    setValue(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [value, set];
}

const COLLECTION = "pawsmash";
const DOC_ID     = "tournament";
function getTournamentRef() {
  try {
    if (!firebase || !firebase.firestore) { console.error("❌ Firebase not loaded"); return null; }
    return firebase.firestore().collection(COLLECTION).doc(DOC_ID);
  }
  catch(e) { console.error("❌ Firestore ref error:", e); return null; }
}
const _listeners = {};
let   _docData       = null;
// Fields we recently wrote locally — ignore Firebase echoes for these for 5s
const _localWrites   = {};
function _lockField(field, ms=5000) { _localWrites[field] = Date.now() + ms; }
function _isLocked(field) { return (_localWrites[field] || 0) > Date.now(); }

function _notify(data) {
  _docData = { ...(_docData||{}), ...data };
  Object.keys(_listeners).forEach(field => {
    if (field in data && !_isLocked(field)) {
      _listeners[field].forEach(fn => fn(data[field]));
    }
  });
}
let _unsubscribe = null;
function _ensureListening() {
  if (_unsubscribe) return;
  const ref = getTournamentRef();
  if (!ref) { console.error("❌ No ref — cannot listen"); return; }
  console.log("🔥 Starting onSnapshot listener...");
  _unsubscribe = ref.onSnapshot(snap => {
    if (snap && snap.exists) _notify(snap.data());
  }, err => {
    console.error("❌ onSnapshot error:", err.code, err.message);
    _unsubscribe = null;
  });
}
async function saveField(field, value) {
  try {
    const ref = getTournamentRef();
    if (!ref) return;
    _lockField(field);
    await ref.set({ [field]: value }, { merge: true });
  } catch(e) { console.error("❌ Save failed:", field, e.code, e.message); }
}
// Write multiple fields atomically and lock all of them
async function saveFields(obj) {
  try {
    const ref = getTournamentRef();
    if (!ref) return;
    Object.keys(obj).forEach(f => _lockField(f));
    await ref.set(obj, { merge: true });
  } catch(e) { console.error("❌ saveFields failed:", e.code, e.message); }
}
function useSharedState(field, initial) {
  const lsKey = `ps_${field}`;
  const [value, setValue] = useState(() => {
    try { const s = localStorage.getItem(lsKey); return s !== null ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  useEffect(() => {
    if (!_listeners[field]) _listeners[field] = new Set();
    const handler = val => {
      setValue(val);
      try { localStorage.setItem(lsKey, JSON.stringify(val)); } catch {}
    };
    _listeners[field].add(handler);
    _ensureListening();
    if (_docData && field in _docData) handler(_docData[field]);
    return () => { _listeners[field].delete(handler); };
  }, [field]);
  const set = useCallback(updater => {
    setValue(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      try { localStorage.setItem(lsKey, JSON.stringify(next)); } catch {}
      saveField(field, next);
      return next;
    });
  }, [field]);
  return [value, set];
}

function generateRR(teams) {
  if (teams.length < 2) return [];
  const t = [...teams];
  if (t.length % 2 !== 0) t.push(null);
  const n = t.length, out = [];
  for (let r = 0; r < n-1; r++) {
    for (let i = 0; i < n/2; i++) {
      const h = t[i], a = t[n-1-i];
      if (h && a) out.push({ id:uid(), home:h, away:a, round:r+1 });
    }
    t.splice(1, 0, t.pop());
  }
  return out;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildSchedule(teams) {
  // ── Step 1: generate RR matches per bracket group ──────────────────
  const groups = {};
  LEVEL_OPTIONS.forEach(l => BRACKET_OPTIONS.forEach(b => {
    const grp = teams.filter(t => t.level===l && t.bracket===b);
    if (grp.length >= 2) {
      const ms = generateRR(grp).map(m => ({ ...m, level:l, bracket:b }));
      groups[`${l}-${b}`] = shuffle(ms);
    }
  }));

  const out = [];

  // Normalise a player name for cross-level identity matching
  // e.g. "JayJay" in Level B and "JayJay" in Level C are the same person
  function playerKey(name) { return name.trim().toLowerCase(); }

  // ── Core scheduler ─────────────────────────────────────────────────
  // playerFree is shared across ALL levels so cross-level players
  // (who appear in e.g. both Level B and Level C) also get rest gaps.
  // courtStart: earliest time any court can be used (default START_MINUTES)
  function assignWithRest(matchList, courts, playerFree, courtStart = START_MINUTES) {
    const courtFree = {};
    courts.forEach(c => { courtFree[c] = courtStart; });
    const pending = [...matchList];

    while (pending.length) {
      let bestIdx = 0, bestStart = Infinity, bestCourt = courts[0];

      pending.forEach((m, i) => {
        const keys = [
          m.home.id, m.away.id,
          playerKey(m.home.player1), playerKey(m.home.player2),
          playerKey(m.away.player1), playerKey(m.away.player2),
        ];
        const teamEarliest = Math.max(...keys.map(k => playerFree[k] || courtStart));
        courts.forEach(c => {
          const s = Math.max(courtFree[c], teamEarliest);
          if (s < bestStart) { bestStart=s; bestIdx=i; bestCourt=c; }
        });
      });

      const m = pending.splice(bestIdx, 1)[0];
      const s = bestStart;
      const e = s + MATCH_DURATION;
      courtFree[bestCourt] = e;
      const restUntil = e + MATCH_DURATION;
      [
        m.home.id, m.away.id,
        playerKey(m.home.player1), playerKey(m.home.player2),
        playerKey(m.away.player1), playerKey(m.away.player2),
      ].forEach(k => { playerFree[k] = restUntil; });
      out.push({ ...m, court:bestCourt, startMin:s, endMin:e });
    }
  }

  // ── Step 2: interleave brackets per level ──────────────────────────
  function interleave(keys) {
    const queues = keys.map(k => [...(groups[k]||[])]);
    const result = [];
    let active = queues.filter(q => q.length > 0);
    while (active.length) {
      active.forEach(q => { if (q.length) result.push(q.shift()); });
      active = active.filter(q => q.length > 0);
    }
    return shuffle(result);
  }

  // ── Step 3: schedule all levels sharing ONE playerFree map ─────────
  // Level B starts only after ALL of E, D, C are fully done.
  const playerFree = {};
  ["E","D","C"].forEach(lv => {
    const keys = Object.keys(groups).filter(k => k.startsWith(lv));
    if (keys.length) assignWithRest(interleave(keys), LEVEL_COURTS[lv], playerFree);
  });

  // Find when the last E/D/C match ends — Level B cannot start before that
  const lastEDCEnd = out.length
    ? Math.max(...out.map(m => m.endMin))
    : START_MINUTES;

  // Push all playerFree times forward to lastEDCEnd so Level B
  // won't be scheduled into any court slot before E/D/C finish
  const bKeys = Object.keys(groups).filter(k => k.startsWith("B"));
  if (bKeys.length) {
    // Level B courts open only at lastEDCEnd — passed as courtStart
    // Also push any cross-level player rest times forward to lastEDCEnd
    const bPlayerFree = {};
    Object.keys(playerFree).forEach(k => {
      bPlayerFree[k] = Math.max(playerFree[k] || START_MINUTES, lastEDCEnd);
    });
    assignWithRest(interleave(bKeys), [1,2,3,4,5,6,7], bPlayerFree, lastEDCEnd);
  }

  return out;
}

function isDone(s) {
  // A match counts as played if marked done OR if a winner was set
  return s?.matchStatus === "done" || !!s?.winner;
}

function computeStandings(teams, matches, matchStates) {
  return [...teams].map(t => {
    const games  = matches.filter(m => m.home.id===t.id || m.away.id===t.id);
    const played = games.filter(m => isDone(matchStates[m.id])).length;
    const wins   = games.filter(m => {
      const s = matchStates[m.id];
      return s?.winner && ((m.home.id===t.id && s.winner==="home") || (m.away.id===t.id && s.winner==="away"));
    }).length;
    const losses = games.filter(m => {
      const s = matchStates[m.id];
      return s?.winner && ((m.home.id===t.id && s.winner==="away") || (m.away.id===t.id && s.winner==="home"));
    }).length;
    const pf = games.reduce((acc,m) => {
      const s = matchStates[m.id];
      if (!isDone(s)) return acc;
      return acc + Number(m.home.id===t.id ? s?.scoreHome||0 : s?.scoreAway||0);
    }, 0);
    const pa = games.reduce((acc,m) => {
      const s = matchStates[m.id];
      if (!isDone(s)) return acc;
      return acc + Number(m.home.id===t.id ? s?.scoreAway||0 : s?.scoreHome||0);
    }, 0);
    return { team:t, played, wins, losses, pf, pa };
  }).sort((a,b) => b.wins - a.wins || (b.pf-b.pa) - (a.pf-a.pa));
}

/* ══════════════════════════════════════════════════════

function BracketView({ teams, levels, brackets }) {
  const grouped = {};
  levels.forEach(l => { grouped[l]={}; brackets.forEach(b => { grouped[l][b]=[]; }); });
  teams.forEach(t => { if (grouped[t.level]?.[t.bracket]) grouped[t.level][t.bracket].push(t); });
  if (!teams.length) return <EmptyState msg="No teams yet."/>;
  return (
    <div>
      {levels.map(lv => {
        const hasAny = brackets.some(b => grouped[lv]?.[b]?.length > 0);
        if (!hasAny) return null;
        const lm = LEVEL_META[lv];
        return (
          <div key={lv} style={{marginBottom:32}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:10,marginBottom:16,background:C.faint,border:`1px solid ${C.border}`,borderRadius:12,padding:"8px 18px"}}>
              <span style={{background:lm.gradient,color:lm.text,borderRadius:7,padding:"3px 14px",fontWeight:900,fontSize:18,fontFamily:"'Fredoka One',sans-serif",letterSpacing:2}}>LEVEL {lv}</span>
              <span style={{color:C.pinkLight,fontSize:12,fontWeight:600}}>{lm.label}</span>
              <span style={{color:C.muted,fontSize:11}}>{teams.filter(t=>t.level===lv).length} pairs</span>
              {LEVEL_COURTS[lv] && <span style={{color:C.muted,fontSize:11}}>· Courts {LEVEL_COURTS[lv].join(", ")}</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:14}}>
              {brackets.map(b => {
                const bT = grouped[lv][b];
                if (!bT?.length) return null;
                const bc = BKT_COLORS[(b-1)%BKT_COLORS.length];
                return (
                  <div key={b} style={{background:C.card,border:`1px solid ${bc}44`,borderRadius:14,padding:16}}>
                    <div style={{color:bc,fontWeight:800,fontSize:13,marginBottom:10,fontFamily:"'Fredoka One',sans-serif",display:"flex",alignItems:"center",gap:6}}>
                      🎯 BRACKET {b} <span style={{color:C.muted,fontWeight:400,fontSize:11}}>({bT.length} pairs)</span>
                    </div>
                    {bT.map((t,i) => (
                      <div key={t.id} style={{fontSize:13,color:"#ddd",padding:"5px 0",borderBottom:i<bT.length-1?`1px solid ${C.faint}`:"none",display:"flex",gap:6}}>
                        <span style={{color:C.muted,fontSize:10,minWidth:16,paddingTop:1}}>{i+1}.</span>
                        🐾 {t.player1} & {t.player2}
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function MatchCard({ match, matchState, onUpdate, onReschedule }) {
  const { home, away, court, startMin, level, bracket } = match;
  const { scoreHome="", scoreAway="", winner=null, matchStatus="pending" } = matchState || {};
  const cc = COURT_COLORS[(court-1) % COURT_COLORS.length];
  const isLate = startMin >= END_MINUTES;
  const [showReschedule, setShowReschedule] = useState(false);

  const [newCourt, setNewCourt] = useState(court);
  const [newHour,  setNewHour]  = useState(Math.floor(startMin/60));
  const [newMin,   setNewMin]   = useState(startMin % 60);

  function openReschedule() {
    setNewCourt(court); setNewHour(Math.floor(startMin/60)); setNewMin(startMin % 60);
    setShowReschedule(true);
  }
  function applyReschedule() {
    const newStartMin = newHour * 60 + newMin;
    onReschedule({ court: Number(newCourt), startMin: newStartMin, endMin: newStartMin + MATCH_DURATION });
    setShowReschedule(false);
  }

  const STATUS_CFG = {
    pending: { label:"Pending", color:"#888",    bg:"rgba(136,136,136,0.08)" },
    ongoing: { label:"Ongoing", color:C.pink,    bg:`${C.pink}18`            },
    done:    { label:"Done",    color:"#2ecc71", bg:"rgba(46,204,113,0.08)"  },

  const cfg = STATUS_CFG[matchStatus] || STATUS_CFG.pending;

  return (
    <div style={{background:cfg.bg,border:`1px solid ${cfg.color}44`,borderRadius:12,padding:"12px 14px",transition:"all 0.2s"}}>
      {/* Header row */}
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}>
        <div style={{background:`${cc}33`,border:`1px solid ${cc}66`,borderRadius:7,padding:"2px 9px",fontFamily:"'Fredoka One',sans-serif",fontSize:13,color:cc,flexShrink:0}}>C{court}</div>
        <LevelBadge level={level}/>
        <BktBadge bracket={bracket}/>
        <div style={{marginLeft:"auto",fontSize:11,color:isLate?"#e74c3c":C.muted,flexShrink:0}}>
          {minutesToTime(startMin)}{isLate?" ⚠️":""}
        </div>
        <button onClick={openReschedule} title="Reschedule"
          style={{background:"rgba(233,30,140,0.08)",border:`1px solid ${C.border}`,borderRadius:6,padding:"2px 7px",color:C.muted,fontSize:11,cursor:"pointer",flexShrink:0,marginLeft:4}}>
          🔄
        </button>
      </div>

      {/* Reschedule panel */}
      {showReschedule && (
        <div style={{background:C.faint,border:`1px solid ${C.pink}44`,borderRadius:10,padding:"12px",marginBottom:12}}>
          <div style={{color:C.pink,fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:10,fontFamily:"'Fredoka One',sans-serif"}}>🔄 RESCHEDULE</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"flex-end"}}>
            <div>
              <label style={{...labelSt,fontSize:10}}>Court</label>
              <select value={newCourt} onChange={e=>setNewCourt(Number(e.target.value))} style={smallSel}>
                {[1,2,3,4,5,6,7].map(c => <option key={c} value={c}>Court {c}</option>)}
              </select>
            </div>
            <div>
              <label style={{...labelSt,fontSize:10}}>Hour</label>
              <select value={newHour} onChange={e=>setNewHour(Number(e.target.value))} style={smallSel}>
                {[17,18,19,20,21,22].map(h => <option key={h} value={h}>{h > 12 ? h-12 : h}:00 {h>=12?"PM":"AM"}</option>)}

            </div>

          <span style={{color:C.muted,fontSize:12}}>—</span>
          <input type="number" min="0" max="99" value={scoreAway} onChange={e=>onUpdate({scoreAway:e.target.value})} style={numInput}/>
        </div>
      </div>

      {/* Bottom row: status dropdown + winner buttons */}
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        {/* Status dropdown */}
        <select value={matchStatus} onChange={e=>onUpdate({matchStatus:e.target.value})}
          style={{...smallSel,flex:1,minWidth:120,
            color: cfg.color,
            border:`1px solid ${cfg.color}66`,
            background: cfg.bg,
            fontWeight:600,
          }}>
          <option value="pending">⏳ Pending</option>
          <option value="ongoing">🔴 Ongoing</option>
          <option value="done">✅ Done</option>
        </select>

        {/* Winner buttons */}
        {[["home",home],["away",away]].map(([side,team]) => (
          <button key={side} onClick={() => onUpdate({winner: winner===side ? null : side})}
            style={{flex:1,background:winner===side?`${C.pink}33`:"transparent",border:`1px solid ${winner===side?C.pink:C.border}`,borderRadius:7,padding:"5px 8px",color:winner===side?C.pink:C.muted,fontSize:11,cursor:"pointer",fontWeight:winner===side?700:400,transition:"all 0.15s",minWidth:70}}>
            🏆 {team.player1.split(" ")[0]}
          </button>
        ))}
      </div>
    </div>
  );
}

    filtered.forEach(m => map[m.court]?.push(m));
    Object.values(map).forEach(arr => arr.sort((a,b)=>a.startMin-b.startMin));
    return map;
  }, [filtered]);

  const byGroup = useMemo(() => {
    const map = {};
    filtered.forEach(m => {
const k=`${m.level}-${m.bracket}`; if (!map[k]) map[k]=[]; map[k].push(m);
    });
    return map;
  }, [filtered]);

  if (!schedule.length) return (
    <div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24,marginBottom:24}}>
        <div style={{fontFamily:"'Fredoka One',sans-serif",fontSize:20,color:C.white,marginBottom:16}}>🏟️ Venue Layout</div>
        {[
          {c:"Courts 1 & 2", l:"Level E — Beginner",      col:"#e91e8c", n:"5:00 PM"},
          {c:"Courts 3 & 4", l:"Level D — Intermediate",  col:"#cd7f32", n:"5:00 PM"},
          {c:"Courts 5,6 & 7",l:"Level C — Advanced",     col:"#ccc",    n:"5:00 PM"},
          {c:"All Courts",   l:"Level B — Elite",          col:"#FFA500", n:"After E/D free up"},
        ].map(r => (
          <div key={r.c} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:`1px solid ${C.faint}`}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:r.col,flexShrink:0}}/>
            <span style={{color:C.white,fontWeight:700,fontSize:14,minWidth:140}}>{r.c}</span>
            <span style={{color:C.muted,fontSize:13}}>→ {r.l}</span>
            <span style={{color:C.muted,fontSize:12,marginLeft:"auto"}}>{r.n}</span>
          </div>
        ))}
        <div style={{marginTop:14,fontSize:13,color:C.muted}}>⏱ 20 min per match · 🕔 5:00 PM – 10:00 PM</div>
      </div>
      <button onClick={generate} style={primaryBtn}>⚡ Generate Full Schedule</button>
    </div>
  );

  return (
    <div>
      {/* Stats bar */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
        {[
          {n:schedule.length, label:"Total",     color:C.pink},
          {n:doneCount,        label:"Done",      color:"#2ecc71"},
          {n:lateCount,        label:"After 10PM",color:lateCount>0?"#e74c3c":C.muted},
        ].map(({n,label,color}) => (
          <div key={label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
            <div style={{fontFamily:"'Fredoka One',sans-serif",fontSize:22,color,lineHeight:1}}>{n}</div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:1,marginTop:2}}>{label.toUpperCase()}</div>
          </div>
        ))}
        <button onClick={regenerate}
          style={{...primaryBtn,padding:"8px 16px",fontSize:12,marginLeft:"auto",background:"rgba(233,30,140,0.15)",border:`1px solid ${C.pink}66`,color:C.pinkLight}}>
          🔁 Regenerate
        </button>
      </div>

      {lateCount>0 && <div style={{background:"rgba(231,76,60,0.1)",border:"1px solid rgba(231,76,60,0.3)",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#e74c3c"}}>⚠️ {lateCount} match{lateCount!==1?"es":""} run past 10:00 PM.</div>}

      {/* Controls */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16,alignItems:"center"}}>
        <div style={{display:"flex",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
          {[["time","⏰ Timeline"],["court","🏟 By Court"],["group","🎯 By Group"]].map(([mode,lbl]) => (
            <button key={mode} onClick={()=>setViewMode(mode)} style={{background:viewMode===mode?`${C.pink}33`:"transparent",border:"none",borderRight:`1px solid ${C.border}`,color:viewMode===mode?C.pink:C.muted,padding:"8px 14px",cursor:"pointer",fontSize:12,fontWeight:viewMode===mode?700:400,whiteSpace:"nowrap"}}>{lbl}</button>
          ))}
        </div>
        <select value={filterLv} onChange={e=>setFilterLv(e.target.value)} style={{...SEL,width:"auto",padding:"7px 12px",fontSize:12}}>
          <option value="ALL">All Levels</option>
          {LEVEL_OPTIONS.map(l => <option key={l} value={l}>Level {l}</option>)}
        </select>
        <select value={filterCt} onChange={e=>setFilterCt(e.target.value)} style={{...SEL,width:"auto",padding:"7px 12px",fontSize:12}}>
          <option value="ALL">All Courts</option>
          {[1,2,3,4,5,6,7].map(c => <option key={c} value={c}>Court {c}</option>)}
        </select>
      </div>

      {/* Timeline */}
      {viewMode==="time" && byTime.map(([ms,matches]) => {
        const mins=+ms, isLate=mins>=END_MINUTES;
        return (
          <div key={ms} style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{background:isLate?"rgba(231,76,60,0.2)":C.faint,border:`1px solid ${isLate?"rgba(231,76,60,0.4)":C.border}`,borderRadius:8,padding:"5px 14px",fontFamily:"'Fredoka One',sans-serif",fontSize:16,color:isLate?"#e74c3c":C.pink,flexShrink:0}}>
                {minutesToTime(mins)}{isLate?" ⚠️":""}
              </div>
              <div style={{flex:1,height:1,background:C.border}}/>
              <span style={{color:C.muted,fontSize:11}}>{matches.length} match{matches.length!==1?"es":""}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10}}>
              {matches.map(m => <MatchCard key={m.id} match={m} matchState={matchStates[m.id]} onUpdate={u=>updateMatchState(m.id,u)} onReschedule={c=>rescheduleMatch(m.id,c)}/>)}
            </div>
          </div>
        );
      })}

      {/* By Court */}
      {viewMode==="court" && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:16}}>
          {Object.entries(byCourt).filter(([,ms])=>ms.length>0).map(([cs,matches]) => {
            const court=+cs, cc=COURT_COLORS[(court-1)%COURT_COLORS.length];
            return (
              <div key={court} style={{background:C.card,border:`2px solid ${cc}44`,borderRadius:16,overflow:"hidden"}}>
                <div style={{background:`${cc}22`,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${cc}33`}}>
                  <div style={{background:cc,borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Fredoka One',sans-serif",fontSize:18,color:"#fff",flexShrink:0}}>{court}</div>
                  <div>
                    <div style={{fontFamily:"'Fredoka One',sans-serif",fontSize:16,color:C.white}}>COURT {court}</div>
                    <div style={{fontSize:11,color:C.muted}}>{matches.length} matches · ends {minutesToTime(matches[matches.length-1].endMin)}</div>
                  </div>
                  <div style={{marginLeft:"auto",fontSize:10,color:cc,fontWeight:700}}>{court<=2?"E":court<=4?"D":"C"} primary</div>
                </div>
                <div style={{padding:12,display:"flex",flexDirection:"column",gap:8}}>
                  {matches.map(m => <MatchCard key={m.id} match={m} matchState={matchStates[m.id]} onUpdate={u=>updateMatchState(m.id,u)} onReschedule={c=>rescheduleMatch(m.id,c)}/>)}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* By Group */}
      {viewMode==="group" && Object.entries(byGroup).sort(([a],[b])=>a.localeCompare(b)).map(([key,matches]) => {
        const [lvl,brk] = key.split("-");
        const lm = LEVEL_META[lvl]||LEVEL_META.E;
        const bc = BKT_COLORS[(+brk-1)%BKT_COLORS.length];
        const done = matches.filter(m=>isDone(matchStates[m.id])).length;
        return (
          <div key={key} style={{marginBottom:24}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}>
              <span style={{background:lm.gradient,color:lm.text,borderRadius:7,padding:"4px 14px",fontWeight:900,fontSize:14,fontFamily:"'Fredoka One',sans-serif"}}>Level {lvl}</span>
              <span style={{background:`${bc}33`,color:bc,border:`1px solid ${bc}66`,borderRadius:7,padding:"4px 14px",fontWeight:800,fontSize:14}}>Bracket {brk}</span>
              <span style={{color:done===matches.length&&matches.length>0?"#2ecc71":C.muted,fontSize:12,fontWeight:700}}>{done}/{matches.length} done</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10}}>
              {matches.map(m => <MatchCard key={m.id} match={m} matchState={matchStates[m.id]} onUpdate={u=>updateMatchState(m.id,u)} onReschedule={c=>rescheduleMatch(m.id,c)}/>)}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   RESULTS VIEW  (reads shared matchStates – no duplication)
══════════════════════════════════════════════════════ */
function ResultsView({ teams, schedule, matchStates, levels, brackets }) {
  const [activeKey, setActiveKey] = useState(null);

  const grouped = useMemo(() => {
    const g = {};
    levels.forEach(l => brackets.forEach(b => {
      const grp = teams.filter(t => t.level===l && t.bracket===b);
      if (grp.length >= 2) g[`${l}-${b}`] = grp;
    }));
    return g;
  }, [teams, levels, brackets]);

  const allKeys = useMemo(() => Object.keys(grouped).sort(), [grouped]);

  // Recompute whenever matchStates changes — serialize as key to force re-render
  const matchStatesKey = useMemo(() => JSON.stringify(matchStates), [matchStates]);

  const getMatches = useCallback(key => schedule.filter(m=>`${m.level}-${m.bracket}`===key), [schedule]);

  const activeMatches  = useMemo(() => activeKey ? getMatches(activeKey) : [], [activeKey, schedule, matchStatesKey]);
  const activeStandings = useMemo(() =>
    activeKey && grouped[activeKey]
      ? computeStandings(grouped[activeKey], activeMatches, matchStates)
      : [],
    [activeKey, activeMatches, matchStates, matchStatesKey]);
  const activePlayed = useMemo(() =>
    activeMatches.filter(m => isDone(matchStates[m.id])).length,
    [activeMatches, matchStates, matchStatesKey]);

  if (!schedule.length) return <EmptyState msg="Generate the schedule first, then record results in the Schedule tab."/>;

  const [activeLvl, activeBrk] = activeKey ? activeKey.split("-") : [null, null];
  const activeLm = activeLvl ? (LEVEL_META[activeLvl]||LEVEL_META.E) : null;
  const activeBc = activeBrk ? BKT_COLORS[(+activeBrk-1)%BKT_COLORS.length] : null;

  return (
    <div>
      {/* Group selector pills */}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:20}}>
        {allKeys.map(key => {
          const [lvl,brk] = key.split("-");
          const lm = LEVEL_META[lvl]||LEVEL_META.E;
          const bc = BKT_COLORS[(+brk-1)%BKT_COLORS.length];
          const ms = getMatches(key);
          const done = ms.filter(m=>isDone(matchStates[m.id])).length;
          return (
            <button key={key} onClick={()=>setActiveKey(activeKey===key?null:key)}
              style={{background:activeKey===key?`${bc}33`:C.card,border:`2px solid ${activeKey===key?bc:C.border}`,borderRadius:10,padding:"7px 14px",cursor:"pointer",transition:"all 0.2s",boxShadow:activeKey===key?`0 2px 12px ${bc}44`:"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <LevelBadge level={lvl} size={10}/>
                <span style={{color:activeKey===key?bc:C.muted,fontWeight:700,fontSize:12}}>B{brk}</span>
              </div>
              {ms.length>0 && <div style={{fontSize:10,color:done===ms.length&&ms.length>0?"#2ecc71":C.pink,marginTop:2,textAlign:"center"}}>{done}/{ms.length}</div>}
            </button>
          );
        })}
      </div>

      {!activeKey && <EmptyState msg="Select a group above to see standings and results."/>}

      {activeKey && grouped[activeKey] && (
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,flexWrap:"wrap"}}>
            <span style={{background:activeLm.gradient,color:activeLm.text,borderRadius:7,padding:"4px 14px",fontWeight:900,fontSize:16,fontFamily:"'Fredoka One',sans-serif"}}>Level {activeLvl}</span>
            <span style={{background:`${activeBc}33`,color:activeBc,border:`1px solid ${activeBc}66`,borderRadius:7,padding:"4px 14px",fontWeight:800,fontSize:16}}>Bracket {activeBrk}</span>
            <span style={{color:C.muted,fontSize:13}}>{activePlayed} of {activeMatches.length} played</span>
          </div>

          {/* Standings table */}
          <div style={{marginBottom:24,borderRadius:12,border:`1px solid ${C.border}`,overflow:"hidden"}}>
            <div style={{background:C.faint,padding:"10px 16px",fontFamily:"'Fredoka One',sans-serif",fontSize:14,color:C.pink,letterSpacing:1}}>📊 STANDINGS</div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:"rgba(233,30,140,0.05)"}}>
                  {["#","Team","P","W","L","PF","PA","+/-"].map(h => (
                    <th key={h} style={{padding:"8px 12px",textAlign:h==="Team"?"left":"center",color:C.muted,fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",borderBottom:`1px solid ${C.border}`}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {activeStandings.map((s,i) => {
                  const diff = s.pf - s.pa;
                  return (
                    <tr key={s.team.id} style={{background:i%2===0?"rgba(233,30,140,0.03)":"transparent",borderBottom:`1px solid ${C.faint}`}}>
                      <td style={{padding:"10px 12px",textAlign:"center",color:i===0?C.pink:i===1?"#f472b6":C.muted,fontWeight:i<2?800:400,fontSize:i===0?16:13}}>{i===0?"🏆":i===1?"🥈":i+1}</td>
                      <td style={{padding:"10px 12px",color:i===0?C.white:"#ccc",fontWeight:i===0?700:400}}>{i===0?"🐾 ":""}{s.team.player1} & {s.team.player2}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",color:C.muted}}>{s.played}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",color:s.wins>0?"#2ecc71":C.muted,fontWeight:s.wins>0?700:400}}>{s.wins}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",color:s.losses>0?"#e74c3c":C.muted}}>{s.losses}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",color:C.muted}}>{s.pf}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",color:C.muted}}>{s.pa}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",color:diff>0?C.pink:diff<0?"#e74c3c":C.muted,fontWeight:diff!==0?700:400}}>{diff>0?"+":""}{diff}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Match result list */}
          <div style={{borderRadius:12,border:`1px solid ${C.border}`,overflow:"hidden"}}>
            <div style={{background:C.faint,padding:"10px 16px",fontFamily:"'Fredoka One',sans-serif",fontSize:14,color:C.pink,letterSpacing:1}}>🏸 MATCH RESULTS</div>
            {activeMatches.length===0 && <div style={{padding:"20px 16px",color:C.muted,fontSize:13}}>No matches scheduled for this group.</div>}
            {activeMatches.map((m,idx) => {
              const s = matchStates[m.id] || {};
              const status = s.matchStatus || "pending";
              const hasWinner = !!s.winner;
              const done = isDone(s);
              const cc = COURT_COLORS[(m.court-1)%COURT_COLORS.length];
              const statusColor = status==="ongoing" ? C.pink : status==="done" ? "#2ecc71" : C.muted;
              const statusLabel = status==="ongoing" ? "🔴 Ongoing" : status==="done" ? "✅ Done" : "⏳ Pending";
              return (
                <div key={m.id} style={{padding:"12px 16px",borderBottom:idx<activeMatches.length-1?`1px solid ${C.faint}`:"none",background:done?"rgba(233,30,140,0.04)":"transparent",display:"flex",flexWrap:"wrap",alignItems:"center",gap:10}}>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <span style={{background:`${cc}22`,color:cc,border:`1px solid ${cc}44`,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>C{m.court}</span>
                    <span style={{color:C.muted,fontSize:11,alignSelf:"center"}}>{minutesToTime(m.startMin)}</span>
                  </div>
                  <div style={{flex:1,minWidth:160,display:"flex",flexWrap:"wrap",alignItems:"center",gap:6}}>
                    <span style={{color:s.winner==="home"?C.pink:C.white,fontWeight:s.winner==="home"?700:400,fontSize:13}}>{s.winner==="home"&&"🏆 "}{m.home.player1} & {m.home.player2}</span>
                    {(s.scoreHome||s.scoreAway) && done && (
                      <span style={{background:`${C.pink}22`,border:`1px solid ${C.pink}44`,borderRadius:7,padding:"2px 12px",color:C.white,fontWeight:900,fontSize:16,fontFamily:"'Fredoka One',sans-serif"}}>{s.scoreHome||0} — {s.scoreAway||0}</span>
                    )}
                    <span style={{color:s.winner==="away"?C.pink:C.white,fontWeight:s.winner==="away"?700:400,fontSize:13}}>{s.winner==="away"&&"🏆 "}{m.away.player1} & {m.away.player2}</span>
                  </div>
                  <span style={{color:statusColor,fontSize:11,fontWeight:600,marginLeft:"auto",flexShrink:0}}>{statusLabel}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   KNOCKOUT VIEW
   ─ Flexible format per level: Final only / SF+Final / QF+SF+Final
   ─ Every slot in every round is manually assignable
   ─ Winners also auto-advance to next round as a convenience
   ─ Format stored per level in koFormats
══════════════════════════════════════════════════════ */

// Format definitions: how many rounds and match counts per round
const KO_FORMATS = {
  final: { label:"Final Only",       rounds:["F"],           sizes:{F:1} },
  sf:    { label:"Semi + Final",      rounds:["SF","F"],      sizes:{SF:2, F:1} },
  qf:    { label:"QF + SF + Final",   rounds:["QF","SF","F"], sizes:{QF:4, SF:2, F:1} },
};
const ROUND_DISPLAY = { QF:"Quarter Finals", SF:"Semi Finals", F:"🏆 Final" };
const ROUND_SHORT   = { QF:"QF", SF:"SF", F:"FINAL" };

// ── KO Match Card ─────────────────────────────────────
function KOMatchCard({ homeTeam, awayTeam, matchData, onUpdate, roundLabel, matchNum, onAssignHome, onAssignAway }) {
  const { scoreHome="", scoreAway="", winner=null } = matchData || {};
  const hasTeams = homeTeam && awayTeam;
  const numIn = { width:44, background:"rgba(233,30,140,0.12)", border:`1px solid ${C.border}`, borderRadius:6, padding:"4px 2px", color:C.white, fontSize:16, fontWeight:800, textAlign:"center", outline:"none", fontFamily:"'Fredoka One',sans-serif" };

  return (
    <div style={{background:winner?`${C.pink}0d`:C.surface, border:`2px solid ${winner?C.pink+"77":C.border}`, borderRadius:14, overflow:"hidden", transition:"border-color 0.2s"}}>
      <div style={{background:C.faint, padding:"5px 12px", display:"flex", alignItems:"center", gap:8}}>
        <span style={{color:C.pink, fontSize:11, fontWeight:700, fontFamily:"'Fredoka One',sans-serif", letterSpacing:1}}>{roundLabel}</span>
        <span style={{color:C.muted, fontSize:10}}>Match {matchNum}</span>
      </div>
      <div style={{padding:12}}>
        {/* Home */}
        <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:4}}>
          <div style={{flex:1, fontSize:12, color:winner==="home"?C.pink:homeTeam?C.white:C.muted, fontWeight:winner==="home"?700:400, lineHeight:1.3}}>
            {winner==="home" && "🏆 "}{homeTeam ? `${homeTeam.player1} & ${homeTeam.player2}` : "TBD"}
          </div>
          <input type="number" min="0" max="99" value={scoreHome} disabled={!hasTeams}
            onChange={e=>onUpdate({scoreHome:e.target.value})}
            style={{...numIn, opacity:hasTeams?1:0.3}}/>
        </div>
        <div style={{textAlign:"center", color:C.muted, fontSize:10, margin:"4px 0"}}>vs</div>
        {/* Away */}
        <div style={{display:"flex", alignItems:"center", gap:8, marginTop:4}}>
          <div style={{flex:1, fontSize:12, color:winner==="away"?C.pink:awayTeam?C.white:C.muted, fontWeight:winner==="away"?700:400, lineHeight:1.3}}>
            {winner==="away" && "🏆 "}{awayTeam ? `${awayTeam.player1} & ${awayTeam.player2}` : "TBD"}
          </div>
          <input type="number" min="0" max="99" value={scoreAway} disabled={!hasTeams}
            onChange={e=>onUpdate({scoreAway:e.target.value})}
            style={{...numIn, opacity:hasTeams?1:0.3}}/>
        </div>
        {/* Winner buttons */}
        {hasTeams && (
          <div style={{display:"flex", gap:6, marginTop:10}}>
            {[["home",homeTeam],["away",awayTeam]].map(([side,team]) => (
              <button key={side} onClick={()=>onUpdate({winner:winner===side?null:side})}
                style={{flex:1, background:winner===side?`${C.pink}33`:"transparent", border:`1px solid ${winner===side?C.pink:C.border}`, borderRadius:7, padding:"4px 8px", color:winner===side?C.pink:C.muted, fontSize:11, cursor:"pointer", fontWeight:winner===side?700:400, transition:"all 0.15s"}}>
                {team.player1.split(" ")[0]} wins 🐾
              </button>
            ))}
          </div>
        )}
        {/* Assign buttons — always shown on every card */}
        <div style={{display:"flex", gap:4, marginTop:8}}>
          <button onClick={onAssignHome}
            style={{flex:1, background:"rgba(233,30,140,0.06)", border:`1px solid ${C.border}`, borderRadius:6, padding:"3px 6px", color:C.muted, fontSize:10, cursor:"pointer"}}>
            {homeTeam ? "✎ Change A" : "+ Set Team A"}
          </button>
          <button onClick={onAssignAway}
            style={{flex:1, background:"rgba(233,30,140,0.06)", border:`1px solid ${C.border}`, borderRadius:6, padding:"3px 6px", color:C.muted, fontSize:10, cursor:"pointer"}}>
            {awayTeam ? "✎ Change B" : "+ Set Team B"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main KnockoutView ─────────────────────────────────
function KnockoutView({ teams, schedule, matchStates }) {
  const [selectedLevel, setSelectedLevel] = useState("B");
  const [koFormats, setKoFormats] = useSharedState("koFormats", { B:"qf", C:"qf", D:"sf", E:"final" });
  const [koData, setKoData] = useSharedState("koData", {});
  const [showSeedModal,  setShowSeedModal]  = useState(false);
  const [showResetModal, setShowResetModal] = useState(false);
  const [assignTarget, setAssignTarget] = useState(null); // { key, slot }

  const format = koFormats[selectedLevel] || "final";
  const fmt    = KO_FORMATS[format];
  const levelData = koData[selectedLevel] || {};

  function mKey(round, idx) { return `${selectedLevel}_${round}_${idx}`; }
  function getM(round, idx) { return levelData[mKey(round,idx)] || {}; }
  function setM(round, idx, update) {
    const key = mKey(round, idx);
    setKoData(prev => ({
      ...prev,
      [selectedLevel]: { ...(prev[selectedLevel]||{}), [key]: { ...(prev[selectedLevel]?.[key]||{}), ...update } },
    }));
  }

  // Winner of a stored match (reads homeTeam/awayTeam from stored data)
  function winnerTeamOf(round, idx) {
    const m = getM(round, idx);
    if (!m.winner) return null;
    return m.winner === "home" ? m.homeTeam : m.awayTeam;
  }

  // Auto-advance: get the team that should feed into a slot from the previous round
  // Returns the stored team if manually set, otherwise the winner from the feeder match
  function resolveTeam(round, idx, slot) {
    const stored = getM(round, idx)[slot==="home"?"homeTeam":"awayTeam"] || null;
    if (stored) return stored; // manual override always wins

    // Auto-feed from previous round
    if (round === "SF" && format === "qf") {
      const qfIdx = idx * 2 + (slot==="home" ? 0 : 1);
      return winnerTeamOf("QF", qfIdx);
    }
    if (round === "F") {
      if (format === "sf" || format === "qf") {
        const sfIdx = slot==="home" ? 0 : 1;
        return winnerTeamOf("SF", sfIdx);
      }
    }
    return null;
  }

  // Champion
  const finalM = getM("F", 0);
  const finalHome = resolveTeam("F", 0, "home");
  const finalAway = resolveTeam("F", 0, "away");
  const champion = finalM.winner === "home" ? finalHome : finalM.winner === "away" ? finalAway : null;

  // RR standings for auto-seed
  function getRRStandings(level) {
    const bkts = [...new Set(teams.filter(t=>t.level===level).map(t=>t.bracket))].sort();
    return bkts.flatMap(b => {
      const grp = teams.filter(t=>t.level===level&&t.bracket===b);
      const ms  = schedule.filter(m=>m.level===level&&m.bracket===b);
      return computeStandings(grp, ms, matchStates);
    });
  }

  const rrStandings = useMemo(() => getRRStandings(selectedLevel), [selectedLevel, teams, schedule, matchStates]);

  function seedFromRR() {
    const st = rrStandings;
    const newData = {};
    if (format === "qf") {
      [[0,7],[3,4],[1,6],[2,5]].forEach(([a,b],i) => {
        newData[mKey("QF",i)] = { homeTeam:st[a]?.team||null, awayTeam:st[b]?.team||null, scoreHome:"", scoreAway:"", winner:null };
      });
      [0,1].forEach(i => { newData[mKey("SF",i)] = { scoreHome:"", scoreAway:"", winner:null }; });
    } else if (format === "sf") {
      [[0,3],[1,2]].forEach(([a,b],i) => {
        newData[mKey("SF",i)] = { homeTeam:st[a]?.team||null, awayTeam:st[b]?.team||null, scoreHome:"", scoreAway:"", winner:null };
      });
    } else {
      newData[mKey("F",0)] = { homeTeam:st[0]?.team||null, awayTeam:st[1]?.team||null, scoreHome:"", scoreAway:"", winner:null };
    }
    newData[mKey("F",0)] = { ...(newData[mKey("F",0)]||{}), scoreHome:"", scoreAway:"", winner:null };
    setKoData(prev => ({ ...prev, [selectedLevel]: { ...(prev[selectedLevel]||{}), ...newData } }));
    setShowSeedModal(false);
  }

  function doAssign(team) {
    if (!assignTarget) return;
    const { key, slot } = assignTarget;
    setKoData(prev => ({
      ...prev,
      [selectedLevel]: {
        ...(prev[selectedLevel]||{}),
        [key]: { ...(prev[selectedLevel]?.[key]||{}), [slot==="home"?"homeTeam":"awayTeam"]:team, winner:null, scoreHome:"", scoreAway:"" },
      },
    }));
    setAssignTarget(null);
  }

  const levelTeams = teams.filter(t=>t.level===selectedLevel);

  // Column renderer
  function renderRound(round) {
    const count = fmt.sizes[round];
    const label = ROUND_DISPLAY[round];
    const short = ROUND_SHORT[round];
    const isFirst = fmt.rounds[0] === round;

    return (
      <div key={round}>
        <div style={{textAlign:"center", color:round==="F"?"#FFD700":C.pink, fontSize:11, fontWeight:700, letterSpacing:3, fontFamily:"'Fredoka One',sans-serif", textTransform:"uppercase", marginBottom:12, paddingBottom:8, borderBottom:`1px solid ${C.border}`}}>
          {label}
        </div>
        <div style={{display:"flex", flexDirection:"column", gap:10}}>
          {Array.from({length:count}, (_,idx) => {
            const key = mKey(round, idx);
            const m   = getM(round, idx);
            const home = resolveTeam(round, idx, "home");
            const away = resolveTeam(round, idx, "away");
            return (
              <KOMatchCard key={idx}
                homeTeam={home}
                awayTeam={away}
                matchData={{...m, homeTeam:home, awayTeam:away}}
                roundLabel={short}
                matchNum={idx+1}
                onAssignHome={()=>setAssignTarget({key, slot:"home"})}
                onAssignAway={()=>setAssignTarget({key, slot:"away"})}
                onUpdate={u => setM(round, idx, u)}
              />
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* Level selector */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
        {LEVEL_OPTIONS.map(lv => {
          const m=LEVEL_META[lv], cnt=teams.filter(t=>t.level===lv).length, active=selectedLevel===lv;
          return (
            <button key={lv} onClick={()=>setSelectedLevel(lv)}
              style={{background:active?m.gradient:"rgba(255,255,255,0.04)",color:active?m.text:C.muted,border:`2px solid ${active?"transparent":C.border}`,borderRadius:12,padding:"10px 20px",cursor:"pointer",transition:"all 0.2s",boxShadow:active?"0 4px 20px rgba(233,30,140,0.3)":"none"}}>
              <div style={{fontWeight:900,fontSize:18,fontFamily:"'Fredoka One',sans-serif",letterSpacing:2}}>{lv}</div>
              <div style={{fontSize:10,fontFamily:"'DM Sans',sans-serif"}}>{m.label} · {cnt} pairs</div>
            </button>
          );
        })}
      </div>

      {/* Format selector */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 18px",marginBottom:20}}>
        <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:10,fontFamily:"'Fredoka One',sans-serif"}}>
          📋 Format for Level {selectedLevel}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {Object.entries(KO_FORMATS).map(([key,{label}]) => {
            const active = format===key;
            return (
              <button key={key} onClick={()=>setKoFormats(prev=>({...prev,[selectedLevel]:key}))}
                style={{background:active?`${C.pink}33`:"transparent", border:`2px solid ${active?C.pink:C.border}`, borderRadius:10, padding:"8px 18px", color:active?C.pink:C.muted, fontSize:13, fontWeight:active?700:400, cursor:"pointer", transition:"all 0.2s"}}>
                {key==="final"?"🏆 ":key==="sf"?"⚡ ":"🎯 "}{label}
              </button>
            );
          })}
        </div>
      </div>

      {/* Champion banner */}
      {champion && (
        <div style={{background:"linear-gradient(135deg,#FFD70018,#FFA50018)",border:"2px solid #FFD700",borderRadius:16,padding:"16px 24px",marginBottom:20,display:"flex",alignItems:"center",gap:16}}>
          <div style={{fontSize:40}}>🏆</div>
          <div>
            <div style={{color:"#FFD700",fontSize:11,fontWeight:700,letterSpacing:3,fontFamily:"'Fredoka One',sans-serif"}}>LEVEL {selectedLevel} CHAMPION</div>
            <div style={{color:C.white,fontSize:20,fontWeight:800,marginTop:4}}>{champion.player1} & {champion.player2}</div>
          </div>
        </div>
      )}

      {/* Actions */}
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}> 
        <button onClick={()=>setShowSeedModal(true)} style={primaryBtn}>🌱 Auto-Seed from RR Standings</button>
        <button onClick={()=>setShowResetModal(true)}
          style={{background:"rgba(231,76,60,0.1)",border:"1px solid rgba(231,76,60,0.35)",borderRadius:10,padding:"10px 18px",color:"#e74c3c",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"'Fredoka One',sans-serif",letterSpacing:0.5}}>
          🗑️ Reset Bracket
        </button>
        <span style={{color:C.muted,fontSize:12}}>Teams can also be assigned manually on each match card below</span>
      </div>

      {/* Bracket columns */}
      <div style={{overflowX:"auto"}}>
        <div style={{display:"grid", gridTemplateColumns:`repeat(${fmt.rounds.length}, 1fr)`, gap:20, minWidth: fmt.rounds.length * 260}}>
          {fmt.rounds.map(round => renderRound(round))}
        </div>
      </div>

      {/* Auto-Seed Modal */}
      {showSeedModal && (
        <Modal title={`🌱 Auto-Seed Level ${selectedLevel} — ${fmt.label}`} onClose={()=>setShowSeedModal(false)}>
          <p style={{color:C.muted,fontSize:13,margin:"0 0 16px"}}>
            Seeds top teams from Level {selectedLevel} RR standings into the <strong style={{color:C.white}}>first round</strong> ({fmt.rounds[0] === "QF" ? "1v8, 4v5, 2v7, 3v6" : fmt.rounds[0] === "SF" ? "1v4, 2v3" : "1v2"}).
          </p>
          <div style={{marginBottom:20,maxHeight:300,overflowY:"auto"}}>
            {rrStandings.length===0
              ? <div style={{color:"#e74c3c",fontSize:13}}>⚠️ No RR results for Level {selectedLevel} yet.</div>
              : rrStandings.slice(0, format==="qf"?8:format==="sf"?4:2).map((s,i) => (
                <div key={s.team.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:`1px solid ${C.faint}`}}>
                  <span style={{color:C.pink,fontWeight:700,fontSize:13,minWidth:22}}>#{i+1}</span>
                  <span style={{color:C.white,fontSize:13,flex:1}}>{s.team.player1} & {s.team.player2}</span>
                  <span style={{color:C.muted,fontSize:11}}>{s.wins}W–{s.losses}L</span>
                </div>
              ))
            }
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={seedFromRR} style={primaryBtn}>🌱 Seed Now</button>
            <button onClick={()=>setShowSeedModal(false)} style={secondaryBtn}>Cancel</button>
          </div>
        </Modal>
      )}

      {/* Reset Modal */}
      {showResetModal && (
        <Modal title="🗑️ Reset Knockout Bracket" onClose={()=>setShowResetModal(false)}>
          <p style={{color:C.muted,fontSize:13,margin:"0 0 20px"}}>
            This will clear <strong style={{color:"#e74c3c"}}>all teams, scores and results</strong> from the <strong style={{color:C.white}}>Level {selectedLevel}</strong> knockout bracket. RR standings are not affected.
          </p>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{
              setKoData(prev => ({ ...prev, [selectedLevel]: {} }));
              setShowResetModal(false);
            }} style={{...primaryBtn,background:"linear-gradient(135deg,#e74c3c,#c0392b)",boxShadow:"0 4px 20px #e74c3c55"}}>
              🗑️ Yes, Reset Level {selectedLevel}
            </button>
            <button onClick={()=>setShowResetModal(false)} style={secondaryBtn}>Cancel</button>
          </div>
        </Modal>
      )}

      {/* Manual Assign Modal */}
      {assignTarget && (
        <Modal title={`Assign ${assignTarget.slot==="home"?"Team A":"Team B"}`} onClose={()=>setAssignTarget(null)}>
          <p style={{color:C.muted,fontSize:12,margin:"0 0 12px"}}>Select a team from Level {selectedLevel}:</p>
          <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:420,overflowY:"auto"}}>
            {levelTeams.length===0 && <div style={{color:C.muted,fontSize:13}}>No teams for Level {selectedLevel}.</div>}
            {levelTeams.map(t => (
              <button key={t.id} onClick={()=>doAssign(t)}
                style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",cursor:"pointer",textAlign:"left",color:C.white,fontSize:13,fontFamily:"'DM Sans',sans-serif",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>🐾 {t.player1} & {t.player2}</span>
                <span style={{color:C.muted,fontSize:11}}>Bracket {t.bracket}</span>
              </button>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   SETTINGS VIEW
══════════════════════════════════════════════════════ */
function SettingsView({ levels, setLevels, brackets, setBrackets, adminPin, setAdminPin, onLogout }) {
  const toggle = (arr, set, val, isNum) =>
    set(prev => prev.includes(val) ? prev.filter(x=>x!==val) : [...prev,val].sort(isNum?(a,b)=>a-b:undefined));

  const [newPin,    setNewPin]    = useState("");
  const [confirmPin,setConfirmPin]= useState("");
  const [pinMsg,    setPinMsg]    = useState(null); // {type:"ok"|"err", text}
  const [showNew,   setShowNew]   = useState(false);
  const [showConf,  setShowConf]  = useState(false);

  function changePin() {
    if (newPin.length < 4)          { setPinMsg({type:"err",text:"PIN must be at least 4 characters."}); return; }
    if (newPin !== confirmPin)       { setPinMsg({type:"err",text:"PINs do not match."}); return; }
    setAdminPin(newPin);
    setNewPin(""); setConfirmPin("");
    setPinMsg({type:"ok",text:"✅ PIN updated successfully!"});
    setTimeout(()=>setPinMsg(null),3000);
  }

  return (
    <div style={{maxWidth:520}}>
      {/* Active Levels */}
      <div style={{marginBottom:32}}>
        <div style={{color:C.pink,fontSize:12,fontWeight:700,letterSpacing:3,marginBottom:16,textTransform:"uppercase",fontFamily:"'Fredoka One',sans-serif"}}>🐾 Active Levels</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
          {LEVEL_OPTIONS.map(l => {
            const lm=LEVEL_META[l], active=levels.includes(l);
            return (
              <button key={l} onClick={()=>toggle(levels,setLevels,l,false)}
                style={{background:active?lm.gradient:"rgba(255,255,255,0.04)",color:active?lm.text:C.muted,border:`2px solid ${active?"transparent":C.border}`,borderRadius:12,padding:"12px 22px",cursor:"pointer",transition:"all 0.2s",boxShadow:active?"0 4px 16px rgba(233,30,140,0.3)":"none"}}>
                <div style={{fontWeight:900,fontSize:22,fontFamily:"'Fredoka One',sans-serif",letterSpacing:2}}>{l}</div>
                <div style={{fontSize:10,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>{lm.label}</div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Active Brackets */}
      <div style={{marginBottom:32}}>
        <div style={{color:C.pink,fontSize:12,fontWeight:700,letterSpacing:3,marginBottom:16,textTransform:"uppercase",fontFamily:"'Fredoka One',sans-serif"}}>🎯 Active Brackets</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          {BRACKET_OPTIONS.map(b => {
            const bc=BKT_COLORS[(b-1)%BKT_COLORS.length], active=brackets.includes(b);
            return (
              <button key={b} onClick={()=>toggle(brackets,setBrackets,b,true)}
                style={{background:active?`${bc}25`:"rgba(255,255,255,0.04)",color:active?bc:C.muted,border:`2px solid ${active?bc:C.border}`,borderRadius:12,padding:"10px 18px",cursor:"pointer",transition:"all 0.2s",boxShadow:active?`0 4px 14px ${bc}44`:"none"}}>
                <div style={{fontWeight:900,fontSize:20,fontFamily:"'Fredoka One',sans-serif"}}>{b}</div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Change Admin PIN */}
      <div style={{marginBottom:32,background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:"20px 24px"}}>
        <div style={{color:C.pink,fontSize:12,fontWeight:700,letterSpacing:3,marginBottom:16,textTransform:"uppercase",fontFamily:"'Fredoka One',sans-serif"}}>🔑 Change Admin PIN</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{position:"relative"}}>
            <input type={showNew?"text":"password"} value={newPin} onChange={e=>setNewPin(e.target.value)}
              placeholder="New PIN (min 4 chars)" style={{...SEL}}/>
            <button onClick={()=>setShowNew(p=>!p)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer"}}>{showNew?"🙈":"👁"}</button>
          </div>
          <div style={{position:"relative"}}>
            <input type={showConf?"text":"password"} value={confirmPin} onChange={e=>setConfirmPin(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&changePin()}
              placeholder="Confirm new PIN" style={{...SEL}}/>
            <button onClick={()=>setShowConf(p=>!p)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer"}}>{showConf?"🙈":"👁"}</button>
          </div>
          {pinMsg && <div style={{fontSize:12,color:pinMsg.type==="ok"?"#2ecc71":"#e74c3c"}}>{pinMsg.text}</div>}
          <button onClick={changePin} style={{...primaryBtn,alignSelf:"flex-start"}}>💾 Update PIN</button>
        </div>
      </div>

      {/* Logout */}
      <div style={{background:"rgba(231,76,60,0.08)",border:"1px solid rgba(231,76,60,0.25)",borderRadius:16,padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
        <div>
          <div style={{color:"#e74c3c",fontWeight:700,fontSize:13}}>🚪 Sign Out</div>
          <div style={{color:C.muted,fontSize:12,marginTop:2}}>Returns to the login screen</div>
        </div>
        <button onClick={onLogout}
          style={{background:"rgba(231,76,60,0.2)",border:"1px solid rgba(231,76,60,0.4)",borderRadius:10,padding:"8px 18px",color:"#e74c3c",fontSize:13,fontWeight:700,cursor:"pointer"}}>
          Sign Out
        </button>
      </div>
    </div>
  );
}
